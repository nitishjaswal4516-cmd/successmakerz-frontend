image: node:20

stages:
  - deploy

cache:
  paths:
    - node_modules/
    - backend/node_modules/

deploy_frontend:
  stage: deploy
  image: alpine:latest
  rules:
    - if: '$DEPLOY_SSH_KEY'
      when: manual
    - when: never
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H 18.225.177.121 >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - echo "Building frontend..."
    - npm ci
    - npm run build
    - echo "Deploying frontend to server..."
    - rsync -avz --delete dist/ ubuntu@18.225.177.121:~/successmakerz/dist/
    - ssh -o StrictHostKeyChecking=no ubuntu@18.225.177.121 "sudo cp -r ~/successmakerz/dist/* /var/www/html/ && sudo systemctl restart nginx"
  only:
    - main

deploy_backend:
  stage: deploy
  image: alpine:latest
  rules:
    - if: '$DEPLOY_SSH_KEY'
      when: manual
    - when: never
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H 18.225.177.121 >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - echo "Deploying backend to server..."
    - ssh -o StrictHostKeyChecking=no ubuntu@18.225.177.121 "cd ~/successmakerz/backend && git pull origin main && npm ci && sudo systemctl restart successmakerz-backend || echo 'Backend service restart skipped'"
  only:
    - main
