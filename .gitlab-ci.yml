image: node:20

stages:
  - install
  - build
  - test
  - deploy

cache:
  paths:
    - node_modules/

install_dependencies:
  stage: install
  script:
    - npm ci
    - npm install typescript --save-dev

build_project:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

unit_test:
  stage: test
  script:
    - if [ -f package.json ]; then npm run test || echo "No test script configured"; else echo "No package.json found"; fi
  allow_failure: true

deploy:
  stage: deploy
  image: alpine:latest
  rules:
    - if: '$DEPLOY_SSH_KEY'
      when: manual
    - when: never
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H 18.225.177.121 >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - echo "Deploying built artifacts to server..."
    - rsync -avz --delete dist/ ubuntu@18.225.177.121:~/successmakerz/dist/
    - ssh ubuntu@18.225.177.121 "sudo cp -r ~/successmakerz/dist/* /var/www/html/ && sudo systemctl restart nginx"
  dependencies:
    - build_project