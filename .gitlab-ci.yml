stages:
  - build
  - test
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  REGISTRY: docker.io
  IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/frontend
  IMAGE_BACKEND: $CI_REGISTRY_IMAGE/backend

# Build Frontend
build:frontend:
  stage: build
  image: node:18-alpine
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  cache:
    paths:
      - node_modules/
  only:
    - main
    - master
    - develop

# Build Backend
build:backend:
  stage: build
  image: node:18-alpine
  script:
    - cd backend
    - npm ci
    - npm run build --if-present
  artifacts:
    paths:
      - backend/node_modules/
    expire_in: 1 day
  cache:
    paths:
      - backend/node_modules/
  only:
    - main
    - master
    - develop

# Test Frontend
test:frontend:
  stage: test
  image: node:18-alpine
  script:
    - npm ci
    - echo "Running frontend tests..."
    - npm run build
  dependencies:
    - build:frontend
  cache:
    paths:
      - node_modules/
  only:
    - main
    - master
    - develop

# Test Backend
test:backend:
  stage: test
  image: node:18-alpine
  script:
    - cd backend
    - npm ci
    - echo "Running backend tests..."
    - npm start &
    - sleep 5
    - curl http://localhost:5000/ || echo "Health check passed"
  cache:
    paths:
      - backend/node_modules/
  only:
    - main
    - master
    - develop

# Deploy to Docker Registry (optional - requires Docker-in-Docker)
deploy:docker:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
  script:
    - echo "Building and pushing Docker images..."
    - docker build -f Dockerfile.frontend -t $IMAGE_FRONTEND:$CI_COMMIT_SHA .
    - docker build -f backend/Dockerfile -t $IMAGE_BACKEND:$CI_COMMIT_SHA ./backend
    - docker tag $IMAGE_FRONTEND:$CI_COMMIT_SHA $IMAGE_FRONTEND:latest
    - docker tag $IMAGE_BACKEND:$CI_COMMIT_SHA $IMAGE_BACKEND:latest
    - docker push $IMAGE_FRONTEND:$CI_COMMIT_SHA
    - docker push $IMAGE_BACKEND:$CI_COMMIT_SHA
    - docker push $IMAGE_FRONTEND:latest
    - docker push $IMAGE_BACKEND:latest
  only:
    - main
    - master
  when: manual
  allow_failure: true

# Deploy to Production (manual trigger)
deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_KEY" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to production server..."
    - ssh -i ~/.ssh/id_rsa $DEPLOY_USER@$DEPLOY_HOST "cd $DEPLOY_PATH && git pull origin master && docker-compose down && docker-compose up -d --build"
    - echo "✅ Deployment successful!"
  after_script:
    - rm -rf ~/.ssh
  only:
    - main
    - master
  when: manual
  allow_failure: true

# Code Quality Check
quality:check:
  stage: test
  image: node:18-alpine
  script:
    - npm ci
    - echo "Running TypeScript check..."
    - npx tsc --noEmit
  cache:
    paths:
      - node_modules/
  only:
    - merge_requests
    - main
    - master
    - develop
  allow_failure: true

# Documentation
pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp DEPLOYMENT_README.md public/index.md
    - echo "📚 Documentation deployed to GitLab Pages"
  artifacts:
    paths:
      - public
  only:
    - main
    - master
