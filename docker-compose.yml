services:
  # Frontend React Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: successmakerz-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - successmakerz-network
    restart: unless-stopped

  # Backend Node.js API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: successmakerz-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb+srv://themohitsha_db_user:G3ogrjvmq2M8r5MB@cluster0.g5e5ypm.mongodb.net/successmakerz?retryWrites=true&w=majority&appName=Cluster0
      - FRONTEND_URL=http://localhost
    depends_on:
      - mongodb
    networks:
      - successmakerz-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MongoDB Database
  mongodb:
    image: mongo:7-jammy
    container_name: successmakerz-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=successmakerz
    volumes:
      - mongodb_data:/data/db
    networks:
      - successmakerz-network
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: successmakerz-redis
    restart: unless-stopped
    networks:
      - successmakerz-network
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
  volumes:
  mongodb_data:
  redis_data:

networks:
  successmakerz-network:
    driver: bridge