<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1F3D"/>
      <stop offset="100%" stop-color="#1A56A0"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E6FD9"/>
      <stop offset="100%" stop-color="#0F3A7A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#E0961A"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>

  <!-- Globe circle -->
  <circle cx="94" cy="105" r="58" fill="url(#globe)" opacity="0.9"/>

  <!-- Globe latitude lines -->
  <ellipse cx="94" cy="105" rx="58" ry="20" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <ellipse cx="94" cy="105" rx="58" ry="40" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>

  <!-- Globe longitude lines -->
  <ellipse cx="94" cy="105" rx="22" ry="58" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <ellipse cx="94" cy="105" rx="44" ry="58" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>

  <!-- Globe outline -->
  <circle cx="94" cy="105" r="58" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- Equator line -->
  <line x1="36" y1="105" x2="152" y2="105" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>

  <!-- Plane shape (pointing top-right) -->
  <!-- Main body -->
  <g transform="translate(100, 72) rotate(-35)">
    <ellipse cx="0" cy="0" rx="18" ry="6" fill="url(#gold)"/>
    <!-- Left wing -->
    <polygon points="-6,-3 -22,14 -2,5" fill="url(#gold)" opacity="0.9"/>
    <!-- Right wing -->
    <polygon points="4,-3 20,-16 2,5" fill="url(#gold)" opacity="0.9"/>
    <!-- Tail fin -->
    <polygon points="-14,3 -22,12 -10,6" fill="#F5C842" opacity="0.85"/>
    <!-- Window highlight -->
    <circle cx="2" cy="-1" r="2.5" fill="rgba(255,255,255,0.5)"/>
    <circle cx="-4" cy="-1" r="2" fill="rgba(255,255,255,0.35)"/>
  </g>

  <!-- Dotted flight path arc -->
  <path d="M 52 148 Q 100 60 148 62" fill="none" stroke="url(#gold)" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>

  <!-- Takeoff dot -->
  <circle cx="52" cy="148" r="4" fill="#F5C842" opacity="0.8"/>
</svg>
